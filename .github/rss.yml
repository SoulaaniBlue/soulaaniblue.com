name: Auto‑update RSS

on:
  push:
    paths:
      - 'blog.js'

jobs:
  update‑rss:
    runs‑on: ubuntu‑latest
    permissions:
      contents: write
    steps:
      # 1. Check out the repo with full history
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # 2. Force the local main to match the remote exactly
      - name: Sync with remote
        run: |
          git fetch origin main
          git reset --hard origin/main

      # 3. Generate the new RSS
      - uses: actions/setup‑node@v4
        with:
          node-version: '18'
      - run: node generate-rss.js

      # 4. Commit and push if rss.xml changed
      - name: Commit & push
        run: |
          git config user.name  "github‑actions[bot]"
          git config user.email "github‑actions[bot]@users.noreply.github.com"
          git add rss.xml

          if git diff --staged --quiet; then
            echo "No changes to RSS"
          else
            git commit -m "Auto‑update RSS"
            git push origin main
          fi
