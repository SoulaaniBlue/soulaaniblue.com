name: Auto‑update RSS

on:
  push:
    paths:
      - 'blog.js'

# Cancel any previous run that is still in progress on the same branch
concurrency:
  group: rss‑update
  cancel‑in‑progress: true

jobs:
  update‑rss:
    runs‑on: ubuntu‑latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch‑depth: 0

      # Make sure we are on the latest remote commit
      - name: Sync with latest remote
        run: |
          git fetch origin main
          git reset --hard origin/main

      - uses: actions/setup‑node@v4
        with:
          node‑version: '18'
      - run: node generate-rss.js

      - name: Commit & push
        run: |
          git config user.name  "github‑actions[bot]"
          git config user.email "github‑actions[bot]@users.noreply.github.com"
          git add rss.xml
          if git diff --staged --quiet; then
            echo "No changes to RSS"
            exit 0
          fi
          git commit -m "Auto‑update RSS"
          # Try to rebase & push – if it fails, log and exit gracefully
          git pull --rebase origin main || { echo "⚠️ Could not rebase, will not push."; exit 1; }
          git push origin main
